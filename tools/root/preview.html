<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Joint — Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1412;
      color: #e8edea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1a221e;
      border: 1px solid #2d3b34;
      border-radius: 16px;
      padding: 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.25rem; margin-bottom: 1.25rem; font-weight: 600; }
    .links { display: flex; flex-direction: column; gap: 0.75rem; }
    a.preview-link {
      display: block;
      padding: 1rem 1.25rem;
      min-height: 48px;
      border-radius: 12px;
      font-weight: 500;
      text-decoration: none;
      color: #0f1412;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    a.preview-link:hover { opacity: 0.9; }
    a.website { background: #5b9bd5; }
    a.app { background: #b8926a; }
    .hint { margin-top: 1.25rem; font-size: 0.8rem; color: #6b7f73; line-height: 1.5; }
    .hint code { background: #2d3b34; padding: 0.15em 0.4em; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>The Joint</h1>
    <div class="links">
      <a href="http://localhost:4000" target="_blank" rel="noopener" class="preview-link website">Website</a>
      <a href="http://localhost:4001" target="_blank" rel="noopener" class="preview-link app">App</a>
    </div>
    <p class="hint">From repo root: <code>npm run start:website</code> (4000), <code>npm run start:app</code> (4001).</p>
  </div>
</body>
</html>
